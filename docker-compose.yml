version: '3.8'

services:
  cyber-lab:
    build: .
    container_name: admin-feedback-system
    ports:
      - "3075:3075"    # Web application
      - "2275:2275"    # SSH for Blue Team
    volumes:
      - logs-data:/opt/admin/logs
      - ./scripts:/app/scripts:ro
    environment:
      - NODE_ENV=production
      - LOG_DIR=/opt/admin/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3075/"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      cyber-range-net:
        ipv4_address: 10.10.14.10

networks:
  cyber-range-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.14.0/24

volumes:
  logs-data:
    driver: local