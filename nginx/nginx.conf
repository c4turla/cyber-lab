# Nginx Configuration for Admin Feedback System
# This is a sample reverse proxy config (optional)
# Docker compose exposes Node.js directly on :3075

upstream feedback_app {
    server 127.0.0.1:3075;
    keepalive 64;
}

server {
    listen 80;
    server_name feedback.admin.local;

    access_log /opt/admin/logs/access.log combined buffer=512k flush=1m;
    error_log /opt/admin/logs/error.log;

    location / {
        proxy_pass http://feedback_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # Block suspicious paths at proxy level
    location /admin {
        deny all;
        return 403;
    }
}